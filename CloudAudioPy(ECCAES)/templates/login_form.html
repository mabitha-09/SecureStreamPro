<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ role }} - Secure Stream Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='styles/secure-stream.css') }}" rel="stylesheet">
  <link href="{{ url_for('static', filename='styles/ui-enhancements.css') }}" rel="stylesheet">
</head>
<body class="auth-page {{ cls }}">
  <a class="auth-back" href="/" aria-label="Back to home"><i class="fa-solid fa-arrow-left"></i><span>Back</span></a>
  <main class="auth-card">
    <a class="auth-logo text-white" href="/"><i class="fa-solid fa-shield-halved me-2"></i>Secure Stream Pro</a>
    <div class="mt-5"><div class="page-kicker">Secure sign in</div><h2 class="mt-2">{{ role }}</h2><p class="muted">Verify your credentials to enter the encrypted workspace.</p></div>
    <form action="{{ action }}" method="post" class="mt-4" autocomplete="off">
      <label class="form-label">Username</label>
      <div class="input-group mb-3"><span class="input-group-text"><i class="fa-solid fa-user"></i></span><input class="form-control" name="uname" required placeholder="Enter username" autocomplete="off"></div>
      <label class="form-label">Password</label>
      <div class="input-group mb-3"><span class="input-group-text"><i class="fa-solid fa-lock"></i></span><input type="password" class="form-control" name="password" required placeholder="Enter password" autocomplete="off" spellcheck="false"></div>
      {% if needkey %}<label class="form-label">Login key</label><div class="input-group mb-4"><span class="input-group-text"><i class="fa-solid fa-key"></i></span><input class="form-control" name="loginkey" required placeholder="Enter approval key" autocomplete="off"></div>{% endif %}
      <button class="btn btn-primary-ss w-100">Sign in securely <i class="fa-solid fa-arrow-right ms-2"></i></button>
    </form>
    {% if register is not defined or register %}<p class="login-footer text-center mt-4">Need an account? <a href="{{ '/NewOwner' if role == 'Owner Workspace' else '/NewUser' }}" class="text-info">Register here</a></p>{% endif %}
  </main>
</body>
</html>
