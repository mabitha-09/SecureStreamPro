l" name="username" required placeholder="Username"></div></div><div class="col-md-6"><div class="input-group"><span class="input-group-text"><i class="fa-solid fa-lock"></i></span><input type="password" class="form-control" name="password" required minlength="4" placeholder="Password"></div></div></div><button class="btn btn-primary-ss w-100 mt-4">Submit registration <i class="fa-solid fa-arrow-right ms-2"></i></button></form></main></body></html>
