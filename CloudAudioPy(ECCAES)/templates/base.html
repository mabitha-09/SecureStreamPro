<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>{% block title %}Secure Stream Pro{% endblock %}</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet"><link href="{{ url_for('static', filename='styles/secure-stream.css') }}" rel="stylesheet"></head><body><div class="app-shell"><aside class="sidebar"><a class="brand" href="/"><i class="fa-solid fa-shield-halved"></i>Secure Stream <span>Pro</span></a><div class="side-label">{% block role %}Control center{% endblock %}</div>{% block sidebar %}<a href="/"><i class="fa-solid fa-house"></i>Home</a>{% endblock %}</aside><main class="main"><header class="topbar"><button class="btn btn-sm btn-secondary-ss d-lg-none" data-sidebar-toggle><i class="fa-solid fa-bars"></i></button><div class="role-tag">{% block top_role %}Protected workspace{% endblock %}</div><a class="btn btn-sm btn-secondary-ss" href="/"><i class="fa-solid fa-arrow-right-from-bracket me-1"></i>Logout</a></header><div class="content">{% block content %}{% endblock %}</div></main></div><footer class="footer-ss">© 2026 Secure Stream Pro · Hybrid ECC-AES protected multimedia sharing</footer><script src="{{ url_for('static', filename='js/secure-stream.js') }}"></script></body></html>
